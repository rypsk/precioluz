# pnpm 11 lee estos ajustes desde aquí, no desde .npmrc.
# minimumReleaseAge: minutos que un paquete debe llevar publicado antes de
# poder instalarse (protección de cadena de suministro). Vercel usa 1 día.
minimumReleaseAge: 1440
verifyStoreIntegrity: false

# Dependencias nativas cuyos scripts de instalación son necesarios durante el
# build de Angular/Vercel.
onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - lmdb
  - msgpackr-extract
